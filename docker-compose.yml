services:
  postgresdb:
    image: postgres:17
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracerider
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'

  valkey:
    image: valkey/valkey:8
    ports:
      - '6379:6379'
    volumes:
      - 'valkey_data:/data'

volumes:
  postgres_data:
  valkey_data: